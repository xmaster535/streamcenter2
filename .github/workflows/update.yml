name: Auto Update Streams

on:
  # Run every 5 minutes
  schedule:
    - cron: '*/5 * * * *'

  # Run on push to main branch
  push:
    branches: [main]

  # Run manually from GitHub Actions tab
  workflow_dispatch:

  # Also trigger on repository dispatch (for external triggers)
  repository_dispatch:
    types: [update-streams]

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install aiohttp selectolax

      - name: Configure Git
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "action@github.com"

      - name: Run Script
        run: |
          python "streamcenter (3).py"

      - name: Commit files
        run: |
          git add .
          git commit -m "Auto-update" || echo "No changes"

      - name: Push changes
        run: |
          git push
